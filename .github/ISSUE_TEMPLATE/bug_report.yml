name: Bug 报告
description: 提交一个可复现的问题，帮助尽快定位与修复
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供**最小可复现信息**，包括配置、运行方式和关键日志。

  - type: dropdown
    id: runtime
    attributes:
      label: 运行环境
      description: 问题出现在哪种环境下？
      options:
        - 本地 Windows
        - 本地 Linux
        - Docker Compose
        - CI / GitHub Actions
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 代码版本
      description: 请填写分支名、commit SHA 或 Release 版本号
      placeholder: 例如 main / a1b2c3d / v0.1.0
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 用 1~3 句话描述实际发生了什么
      placeholder: 例如启动 runner 后在订阅行情阶段报错退出
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序列出最小复现步骤
      placeholder: |
        1. 执行 xxx
        2. 使用配置 xxx
        3. 观察到 xxx
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你原本预期看到什么行为？
      placeholder: 例如策略应正常启动，并持续输出监控快照
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志与截图
      description: 请粘贴关键报错、堆栈、配置片段或截图
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索过现有 Issue，确认不是重复问题
          required: true
        - label: 我已尽量提供复现步骤、配置和日志
          required: true
